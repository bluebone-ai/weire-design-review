name: Validate dual-platform plugin

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate package, manifests, links, and scorer
        run: python3 scripts/validate_release.py

      - name: Test deterministic scoring and development gate
        run: python3 -m unittest discover -s tests -p "test_*.py"

      - name: Validate release shell syntax
        run: bash -n scripts/validate.sh scripts/release.sh
